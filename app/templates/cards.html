<!DOCTYPE html>
<html>
<head>
    <title>English Cards</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>
<body>

{% extends "base.html" %}

{% block title %}English Platform{% endblock %}

{% block content %}

<h1 class="mt-4">English Platform</h1>

<a href="/">Back to Home</a>

<ul>
{% for card in cards %}
    <li>
        <b>{{ card.front }}</b>
        → {{ card.back }}
    </li>
{% endfor %}
</ul>

{% endblock %}
