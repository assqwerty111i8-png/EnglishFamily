<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}English Platform{% endblock %}</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- 🌈 Background style -->
    <style>
        body {
            background: linear-gradient(135deg, #f6f9ff, #eef2ff);
            min-height: 100vh;
        }

        .bg-blur {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.4;
        }

        .blob1 {
            background: #4f46e5;
            top: -100px;
            left: -100px;
        }

        .blob2 {
            background: #22c55e;
            bottom: -120px;
            right: -120px;
        }
    </style>

</head>

<body>

<!-- 🌈 background blobs -->
<div class="bg-blur blob1"></div>
<div class="bg-blur blob2"></div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            📚 English Platform
        </a>

        <div class="navbar-nav ms-auto">

            <a class="nav-link" href="/">
                🏠 Home
            </a>

            <a class="nav-link" href="/profiles">
                👥 Users
            </a>

            <a class="nav-link" href="/stats">
                📊 Stats
            </a>

            <a class="nav-link" href="/cards-page">
                🗂 Cards
            </a>

            <a class="nav-link text-success fw-bold" href="/login">
                🔑 Login
            </a>

            <a class="nav-link text-warning fw-bold" href="/register">
                ✨ Register
            </a>

            <a class="nav-link fw-bold" href="/my-profile">
                👤 Profile
            </a>

        </div>

    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
