<!DOCTYPE html>
<html>
<head>
    <title>Statistics</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{
            background:#f5f7fb;
        }

        .stat-card{
            background:white;
            border-radius:20px;
            padding:30px;
            text-align:center;
            box-shadow:0 5px 20px rgba(0,0,0,.08);
        }

        .number{
            font-size:48px;
            font-weight:700;
        }

        .label{
            color:#6c757d;
        }

    </style>

</head>
<body>

{% extends "base.html" %}

{% block title %}English Platform{% endblock %}


{% block content %}

<div class="container mt-5">

    <a
        href="/"
        class="btn btn-secondary mb-4"
    >
        ← Home
    </a>

    <h1 class="mb-4">
        📊 Platform Statistics
    </h1>

    <div class="row">

        <div class="col-md-4 mb-4">

            <div class="stat-card">

                <div class="number">
                    {{ users_count }}
                </div>

                <div class="label">
                    Users
                </div>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="stat-card">

                <div class="number">
                    {{ cards_count }}
                </div>

                <div class="label">
                    Cards
                </div>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="stat-card">

                <div class="number">
                    {{ reviews_count }}
                </div>

                <div class="label">
                    Reviews
                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
