{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 75vh;">

    <div class="card shadow-lg border-0" style="width: 420px; border-radius: 16px;">

        <div class="card-body p-4">

            <div class="text-center mb-4">
                <h2 class="fw-bold">✨ Register</h2>
                <p class="text-muted mb-0">
                    Создай новый профиль
                </p>
            </div>

            <form method="post" action="/register">

                <label class="form-label text-muted">Пользователь</label>
                <select
                    class="form-select mb-3"
                    name="role"
                    required
                >
                    <option value="">Выбери роль</option>
                    <option>Папа</option>
                    <option>Мама</option>
                    <option>Матвей</option>
                    <option>Никита</option>
                </select>

                <label class="form-label text-muted">Уровень английского</label>
                <select
                    class="form-select mb-3"
                    name="cefr_level"
                    required
                >
                    <option value="">Выбери уровень</option>
                    <option>A1</option>
                    <option>A2</option>
                    <option>B1</option>
                    <option>B2</option>
                    <option>C1</option>
                    <option>C2</option>
                </select>

                <label class="form-label text-muted">Пароль</label>
                <input
                    class="form-control mb-3"
                    name="password"
                    type="password"
                    placeholder="Придумай пароль"
                    required
                >

                <button
                    type="submit"
                    class="btn btn-success w-100 py-2 fw-bold"
                    style="border-radius: 10px;"
                >
                    🚀 Создать аккаунт
                </button>

            </form>

            <div class="text-center mt-3">
                <small class="text-muted">
                    Уже есть аккаунт?
                    <a href="/login">Войти</a>
                </small>
            </div>

        </div>

    </div>

</div>

{% endblock %}
