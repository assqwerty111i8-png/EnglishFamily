<!DOCTYPE html>
<html>
<head>
    <title>Review Saved</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body>

{% extends "base.html" %}

{% block title %}English Platform{% endblock %}

{% block content %}

<div class="container mt-5">

    <h1>Review Saved</h1>

    <p>
        Rating: {{ rating }}
    </p>

    {% if next_card %}

    <div class="alert alert-info">
        Next card:
        <strong>{{ next_card.front }}</strong>
    </div>

    <a
        href="/study/{{ user_id }}/{{ next_card.id }}"
        class="btn btn-success"
    >
        Next Card
    </a>

    {% else %}

    <div class="alert alert-success">
        All cards completed.
    </div>

    <a
        href="/user/{{ user_id }}"
        class="btn btn-primary"
    >
        Back to User
    </a>

    {% endif %}

</div>

{% endblock %}
