<!DOCTYPE html>
<html>
<head>
    <title>Study Card</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{
            background:#f5f7fb;
        }

        .flip-container{
            width:100%;
            max-width:700px;
            height:350px;
            margin:auto;
            perspective:1000px;
        }

        .flip-card{
            width:100%;
            height:100%;
            position:relative;
            transform-style:preserve-3d;
            transition:transform .6s;
            cursor:pointer;
        }

        .flip-card.flipped{
            transform:rotateY(180deg);
        }

        .card-face{
            position:absolute;
            width:100%;
            height:100%;
            backface-visibility:hidden;

            background:white;
            border-radius:25px;

            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;

            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

        .card-back{
            transform:rotateY(180deg);
        }

        .word{
            font-size:52px;
            font-weight:700;
        }

        .translation{
            font-size:40px;
            font-weight:700;
            color:#198754;
        }

        .hint{
            color:#6c757d;
            margin-top:15px;
        }

        .rating-panel{
            display:none;
        }

    </style>

</head>
<body>

{% extends "base.html" %}

{% block title %}English Platform{% endblock %}

{% block content %}

<div class="container mt-5">

    <a
        href="/user/{{ user_id }}"
        class="btn btn-secondary mb-4"
    >
        ← Back
    </a>

    {% if card %}


    <div class="flip-container">

        <div
            class="flip-card"
            id="card"
            onclick="flipCard()"
        >

            <div class="card-face">

                <div class="word">
                    {{ card.front }}
                </div>

                <div class="hint">
                    Нажмите на карточку, чтобы увидеть ответ.
                </div>

            </div>

            <div class="card-face card-back">

                <div class="translation">
                    {{ card.back }}
                </div>

                <div class="hint">
                    Выберите уровень сложности ниже
                </div>

            </div>

        </div>

    </div>

    <div
        class="text-center mt-4 rating-panel"
        id="ratingPanel"
    >

        <a
            href="/flash_review/{{ user_id }}/1/{{ card.id }}"
            class="btn btn-danger m-1"
        >
            Again
        </a>

        <a
            href="/flash_review/{{ user_id }}/2/{{ card.id }}"
            class="btn btn-warning m-1"
        >
            Hard
        </a>

        <a
            href="/flash_review/{{ user_id }}/3/{{ card.id }}"
            class="btn btn-success m-1"
        >
            Good
        </a>

        <a
            href="/flash_review/{{ user_id }}/4/{{ card.id }}"
            class="btn btn-primary m-1"
        >
            Easy
        </a>

    </div>

    {% else %}

    <div class="alert alert-warning">
        No cards found.
    </div>

    {% endif %}

</div>

<script>

function flipCard() {

    document
        .getElementById("card")
        .classList
        .add("flipped");

    document
        .getElementById("ratingPanel")
        .style
        .display = "block";
}

</script>

{% endblock %}
